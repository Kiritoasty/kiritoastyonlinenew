<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiritoasty's Blogs</title>

<link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Open-Dyslexic', sans-serif;
  background: url('https://files.catbox.moe/vd3jvz.jpg') center/cover no-repeat fixed;
  color: white;
}

/* center card */
.center-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 480px;
  padding: 20px;
  
  background: rgba(23, 23, 23, 0.35);
  backdrop-filter: blur(6px);
  
  border-radius: 14px;
}

/* TOP TITLE */
.header {
  font-size: 20px;
  margin-bottom: 20px;
  text-align: center;
}

/* blog list styling */
.blog-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.blog-item {
  background: rgba(0, 0, 0, 0.25);
  padding: 12px 15px;
  margin-bottom: 12px;
  border-radius: 10px;
  transition: background 0.2s;
}

.blog-item:hover {
  background: rgba(0, 0, 0, 0.45);
}

.blog-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  margin: 0;
  color: #8aff8a;
  text-decoration: none;
}

.blog-title:hover {
  color: white;
}

.blog-desc {
  font-size: 13px;
  margin-top: 4px;
  color: #ccc;
}

/* links */
.links {
  margin-top: 15px;
  font-size: 13px;
  text-align: center;
}

.links a {
  color: #aaa;
  text-decoration: none;
  margin: 0 8px;
}

.links a:hover {
  color: white;
}
</style>
</head>

<body>

<div class="center-box">

  <div class="header">Kiritoasty's Blogs</div>

  <ul class="blog-list">
    <li class="blog-item">
      <a href="https://web.kiritoasty.us/blogs/helloworld" class="blog-title">Hello world! - 3/21/2026</a>
      <p class="blog-desc">The creation of this website</p>
    </li>
  </ul>

  <div class="links">
    <a href="https://web.kiritoasty.us">home</a>
    <a href="https://web.kiritoasty.us/blogs/">blogs</a>
  </div>

</div>

</body>
</html>
