<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Title</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:url('https://files.catbox.moe/vd3jvz.jpg') no-repeat center/cover;
    color:white;
    min-height:100vh;
}
.overlay{
    position:fixed;
    width:100%;height:100%;
    backdrop-filter:blur(6px);
}
.container{
    max-width:800px;
    margin:auto;
    padding:40px 20px;
    position:relative;
}

.links a{
    display:inline-block;
    margin:6px;
    padding:8px 14px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    text-decoration:none;
    color:white;
    transition:0.25s;
}

.post{
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:30px;
    backdrop-filter:blur(18px);
}
.footer{
    text-align:center;
    margin-top:40px;
}
.footer a{
    margin:0 10px;
    padding:8px 14px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    text-decoration:none;
    transition:0.25s;
}
.footer a:hover{
    background:rgba(255,255,255,0.2);
    transform:scale(1.05);
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">

<div class="post">
    <h1>Post Title</h1>

    <p>content here</p>

</div>

</html>
