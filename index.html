<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiritoasty's Corner</title>

<link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Open-Dyslexic', sans-serif;
  background: url('https://files.catbox.moe/vd3jvz.jpg') center/cover no-repeat fixed;
  color: white;
}
.center-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 420px;
  padding: 20px;
  
  background: rgba(23, 23, 23, 0.35);
  backdrop-filter: blur(6px);
  
  border-radius: 14px;
}

.header {
  font-size: 18px;
  margin-bottom: 10px;
}

.terminal {
  background: #0f0f0f;
  border-radius: 10px;
  padding: 15px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  height: 220px;
  overflow-y: auto;
  cursor: text;
}
.line {
  display: flex;
}
.prompt {
  color: #8aff8a;
  margin-right: 6px;
  white-space: nowrap;
}
.terminal-input {
  background: none;
  border: none;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  outline: none;
  width: 100%;
}
.links {
  margin-top: 10px;
  font-size: 13px;
}

.links a {
  color: #aaa;
  text-decoration: none;
  margin-right: 10px;
}

.links a:hover {
  color: white;
}
</style>
</head>

<body>

<div class="center-box">

  <div class="header">Kiritoasty's Corner</div>

  <div class="terminal" id="terminal">
    <div>> type "help"</div>

    <div class="line">
      <span class="prompt">user@site:~$</span>
      <input id="input" class="terminal-input" autofocus>
    </div>
  </div>

  <div class="links">
    <a href="https://web.kiritoasty.us">home</a>
    <a href="https://web.kiritoasty.us/blogs/">blogs</a>
  </div>

</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

const commands = {
  help: () => "about projects contact clear",
  about: () => "you want to know about me, kiritoasty? i'm in the mbti of entp-a and i'm very good at defending others, i have hobbies like occasional video editing, web development, node programming, and more, and i'm the owner of my friend group. ",
  projects: () => "linux server experimentation are alot of my projects, but my other projects are kiritoasty engine, toastyos (wip), and all of my websites, including meowl.website (heh)",
  contact: () => "my email is kiritoastyy@gmail.com if you want to contact me.",
  clear: () => { 
    terminal.innerHTML = "";
    addInputLine();
    return ""; 
  }
};

function print(text) {
  if (text !== "") {
    const div = document.createElement("div");
    div.textContent = text;
    terminal.appendChild(div);
  }
  terminal.scrollTop = terminal.scrollHeight;
}

function addInputLine() {
  const line = document.createElement("div");
  line.className = "line";

  const prompt = document.createElement("span");
  prompt.className = "prompt";
  prompt.textContent = "user@site:~$";

  const newInput = document.createElement("input");
  newInput.className = "terminal-input";

  line.appendChild(prompt);
  line.appendChild(newInput);
  terminal.appendChild(line);

  newInput.focus();

  newInput.addEventListener("keydown", handleInput);
}

function handleInput(e) {
  if (e.key === "Enter") {
    const value = e.target.value.trim().toLowerCase();
    e.target.disabled = true;

    print("user@site:~$ " + value);

    if (commands[value]) {
      print(commands[value]());
    } else {
      print("unknown command");
    }

    addInputLine();
  }
}
terminal.addEventListener("click", () => {
  const inputs = terminal.querySelectorAll("input");
  if (inputs.length > 0) {
    inputs[inputs.length - 1].focus();
  }
});

// initial handler
input.addEventListener("keydown", handleInput);
</script>

</body>
</html>
