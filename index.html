<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kiritoasty's Corner</title>

<link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Open-Dyslexic', sans-serif;
  background: url('https://files.catbox.moe/vd3jvz.jpg') center/cover no-repeat fixed;
  color: white;
}
.center-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 420px;
  padding: 20px;
  
  background: rgba(23, 23, 23, 0.35);
  backdrop-filter: blur(6px);
  
  border-radius: 14px;
}

.header {
  font-size: 18px;
  margin-bottom: 10px;
}

.terminal {
  background: #0f0f0f;
  border-radius: 10px;
  padding: 15px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  height: 220px;
  overflow-y: auto;
  cursor: text;
}
.line {
  display: flex;
}
.prompt {
  color: #8aff8a;
  margin-right: 6px;
  white-space: nowrap;
}
.terminal-input {
  background: none;
  border: none;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  letter-spacing: 1px;
  outline: none;
  width: 100%;
}
.links {
  margin-top: 10px;
  font-size: 13px;
}

.links a {
  color: #aaa;
  text-decoration: none;
  margin-right: 10px;
}

.links a:hover {
  color: white;
}
</style>
</head>

<body>

<div class="center-box">

  <div class="header">Kiritoasty's Corner (type "help" for commands)</div>

  <div class="terminal" id="terminal">
    <div>> type "help"</div>

    <div class="line">
      <span class="prompt">user@site:~$</span>
      <input id="input" class="terminal-input" autofocus>
    </div>
  </div>

  <div class="links">
    <a href="https://web.kiritoasty.us">home</a>
    <a href="https://web.kiritoasty.us/blogs/">blogs</a>
  </div>

</div>

<script>
const terminal = document.getElementById("terminal");

const commands = {
  help: () => "about projects contact clear",
  about: () => "you want to know about me, kiritoasty? i'm in the mbti of entp-a and i'm very good at defending others, i have hobbies like occasional video editing, web development, node programming, and more, and i'm the owner of my friend group.",
  projects: () => "linux server experimentation are a lot of my projects, but my other projects are kiritoasty engine, toastyos (wip), and all of my websites, including meowl.website (heh)",
  contact: () => "my discord is kiritoasty.de if you want to contact me."
};

function print(text) {
  if (!text) return;

  const div = document.createElement("div");
  div.textContent = text;
  terminal.appendChild(div);

  terminal.scrollTop = terminal.scrollHeight;
}

function addInputLine() {
  // 🧹 Ensure no extra active inputs exist
  const oldInputs = terminal.querySelectorAll("input");
  oldInputs.forEach(input => input.disabled = true);

  const line = document.createElement("div");
  line.className = "line";

  const prompt = document.createElement("span");
  prompt.className = "prompt";
  prompt.textContent = "user@site:~$ ";

  const input = document.createElement("input");
  input.className = "terminal-input";

  line.appendChild(prompt);
  line.appendChild(input);
  terminal.appendChild(line);

  input.focus();

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const value = input.value.trim().toLowerCase();

      // Turn input into plain text (no duplication)
      const text = document.createElement("span");
      text.textContent = value;

      line.removeChild(input);
      line.appendChild(text);

      // 🧼 CLEAR (handled here ONLY)
      if (value === "clear") {
        terminal.innerHTML = "";
        addInputLine();
        return;
      }

      if (commands[value]) {
        const result = commands[value]();
        if (result) print(result);
      } else {
        print("unknown command");
      }

      addInputLine();
    }
  });
}

// click anywhere to focus latest input
terminal.addEventListener("click", () => {
  const inputs = terminal.querySelectorAll("input");
  if (inputs.length > 0) {
    inputs[inputs.length - 1].focus();
  }
});

// 🚀 start fresh (IMPORTANT: no pre-existing input in HTML)
terminal.innerHTML = "";
addInputLine();
</script>
</body>
</html>
