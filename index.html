<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiritoasty.online</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
    height:100vh;
    background:url('https://files.catbox.moe/vd3jvz.jpg') no-repeat center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:'Inter',sans-serif;
}

/* subtle overlay pulse */
.bg-overlay{
    position:absolute;
    width:100%;height:100%;
    backdrop-filter:blur(3px);
    animation:pulse 10s ease-in-out infinite;
}
@keyframes pulse{
    0%,100%{backdrop-filter:blur(3px)}
    50%{backdrop-filter:blur(7px)}
}

/* glass card */
.glass{
    position:relative;
    width:520px;
    padding:30px;
    border-radius:24px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    animation:float 6s ease-in-out infinite;
    transition:transform 0.1s ease;
    color:white;
}

/* glow effect */
.glass::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:24px;
    background:linear-gradient(120deg, rgba(120,120,255,0.15), rgba(255,120,255,0.15));
    opacity:0.6;
    filter:blur(20px);
    z-index:-1;
}

@keyframes float{
    0%{transform:translateY(0px)}
    50%{transform:translateY(-12px)}
    100%{transform:translateY(0px)}
}

h1{
    text-align:center;
    font-weight:600;
    margin-bottom:8px;
    color:white;
}

p{
    text-align:center;
    opacity:0.85;
    margin-bottom:20px;
    color:white;
}

/* terminal */
.terminal{
    background:rgba(0,0,0,0.45);
    border-radius:14px;
    padding:15px;
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    color:#d1d1ff;
    height:220px;
    overflow-y:auto;
}

.line{margin-bottom:6px;}
.prompt{color:#8be9fd;}
.cmd{color:#50fa7b;}

.input-line{
    display:flex;
}

input{
    background:none;
    border:none;
    outline:none;
    color:white;
    font-family:'JetBrains Mono', monospace;
    flex:1;
}

/* links */
.links{
    margin-top:15px;
}
.links a{
    display:inline-block;
    margin:6px;
    padding:8px 14px;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    text-decoration:none;
    color:white;
    transition:0.25s;
}
.links a:hover{
    background:rgba(255,255,255,0.25);
    transform:scale(1.08);
}

</style>
</head>
<body>
<div class="bg-overlay"></div>

<div class="glass" id="card">
    <h1>Kiritoasty.online</h1>
    <p>Linux, servers, and blogs power me</p>

    <div class="terminal" id="terminal">
        <div class="line"><span class="prompt">user@site:~$</span> <span class="cmd">welcome</span></div>
        <div class="line">type <b>help</b> to see commands</div>
    </div>

    <div class="input-line">
        <span class="prompt">></span>
        <input id="input" autocomplete="off" autofocus>
    </div>

    <div class="links">
        <a href="file:///C:/Users/Kiritoasty/Downloads/bloglist.html">Blogs</a>
    </div>
</div>

<script>
// terminal logic
const input = document.getElementById('input');
const terminal = document.getElementById('terminal');

const commands = {
    help: `commands: about, projects, contact, clear`,

    about: `do YOU want to know about me as kiritoasty? well, here you are!
I have friends such as renten, zuma, scaling, floatz, rewindees, and more!
I'm a privacy oriented person. I use tools like proton vpn, and is against most of age verification from tech.
I'm a web developer, node programmer.`,

    projects: `kiritoasty engine, ToastyOS (wip), literally all of my websites`,

    contact: `email: kiritoastyy@gmail.com`,
};

input.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
        const value = input.value.trim();

        terminal.innerHTML += `<div class="line"><span class="prompt">></span> ${value}</div>`;

        if(value === 'clear'){
            terminal.innerHTML = '';
        } else if(commands[value]){
            terminal.innerHTML += `<div class="line">${commands[value]}</div>`;
        } else {
            terminal.innerHTML += `<div class="line">command not found</div>`;
        }

        terminal.scrollTop = terminal.scrollHeight;
        input.value = '';
    }
});

// parallax
const card = document.getElementById('card');
document.addEventListener('mousemove', (e)=>{
    const x = (window.innerWidth/2 - e.clientX)/25;
    const y = (window.innerHeight/2 - e.clientY)/25;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
